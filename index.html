  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

  .conn-row{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:none;
    padding:9px 4px;border-top:1px solid var(--line-soft);cursor:pointer;font-family:var(--sans);font-size:15px;color:var(--ink)}

  .crop-controls{padding:14px 24px 4px}

  .crop-hint{text-align:center;font-size:12.5px;color:#bdb6ad;margin-top:8px}
  .crop-bar{display:flex;gap:10px;padding:14px 18px calc(18px + env(safe-area-inset-bottom))}
  .me-toggle{display:flex;align-items:center;gap:9px;margin-top:14px;padding:11px 13px;
    background:#f0ece5;border:1px solid var(--line);border-radius:11px;font-size:14.5px;font-weight:500;cursor:pointer}
  .me-toggle input{width:auto}
  .me-pill{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    color:#fff;background:var(--accent);border-radius:999px;padding:2px 8px;margin-left:9px;vertical-align:2px}
  .gfilter{display:flex;flex-wrap:wrap;gap:8px;padding:2px 0 12px}
  .gchip{flex:0 0 auto;background:var(--surface);border:1px solid var(--line);border-radius:999px;
    padding:7px 14px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;font-family:var(--sans)}
  .gchip.on{background:var(--ink);color:#fff;border-color:transparent}

    color:#fff;padding:11px 18px;border-radius:11px;font-size:14px;z-index:60;
    box-shadow:0 6px 20px rgba(0,0,0,.22);max-width:90%}

  a.hiddenlink{display:none}

<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const {useState,useEffect,useRef,useMemo} = React;
const VERSION = "1.13";
const STORE_KEY = "torcon_v1";
const CHANGELOG = [
  {v:"1.13", d:"Verbindung hinzufügen als kompakte Namensliste, Suche auch nach Gruppe. Gruppenmitglieder erscheinen im Netz. Gruppenfilter bricht um statt seitwärts zu scrollen."},
  {v:"1.12", d:"Netz erkunden: ein Gesicht antippen macht es zum Mittelpunkt, die Mitte antippen öffnet das Profil. „Zu mir“ springt zurück."},
  {v:"1.11", d:"Verbindung hinzufügen mit Suchfeld statt langer Liste: Typ wählen, Person suchen, antippen."},
  {v:"1.10", d:"Die Ich-Markierung sitzt jetzt einmalig in den Einstellungen statt in jedem Profil."},
  {v:"1.9", d:"Neue Netz-Ansicht: du im Zentrum, deine Verbindungen als runde Gesichter rundherum, Linien zu dir und zwischen Verbundenen. Tippen öffnet die Person."},
  {v:"1.8", d:"Eine Person als „Ich“ markierbar (Mittelpunkt). Gruppen wie Familie oder Freundeskreis anlegen, zuordnen und nach ihnen filtern."},
  {v:"1.7", d:"Funktion meint die Rolle für dich (z.B. mein Vater). Suche findet jetzt auch Verbindungen nach Typ und verbundenem Namen."},
  {v:"1.6", d:"Beruf heißt jetzt Funktion und steht als Titel unter dem Namen. Tippen auf Torcon führt zur Startseite."},
  {v:"1.5", d:"Bilder zuschneiden vor dem Hinzufügen und später erneut, geheime Felder per langem Druck auf das Foto."},
  {v:"1.4", d:"Versionshistorie ausklappbar, Hinweis wenn eine neue Version zum Laden bereitsteht."},
  {v:"1.3", d:"Beruf als eigenes Feld, wird auch durchsucht."},
  {v:"1.2", d:"Foto direkt per Kamera aufnehmen oder aus der Galerie wählen."},
  {v:"1.1", d:"Versionshistorie und Ideen-Notizen, Suche auch nach Ort des Kennenlernens und eigenen Feldern, Icon und Installation auf dem Startbildschirm."},
  {v:"1.0", d:"Erste Version: Kartei mit Personen, Foto, Standard- und eigenen Feldern, Verbindungen mit Typ, Geburtstage und Export/Import."},
];
const REL_TYPES = ["Familie","Freund","Partner","Kollege","Sonstige"];

/* ---------- storage ---------- */
function loadStore(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return {people:[], ideas:[], groups:[]};
    const data = JSON.parse(raw);
    return {
      people: Array.isArray(data.people) ? data.people : [],
      ideas: Array.isArray(data.ideas) ? data.ideas : [],
      groups: Array.isArray(data.groups) ? data.groups : [],
    };
  }catch(e){ return {people:[], ideas:[], groups:[]}; }
}
function saveStore(people, ideas, groups){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify({version:VERSION, people, ideas, groups})); }
  catch(e){ alert("Speichern fehlgeschlagen. Eventuell ist der Speicher voll (zu viele oder zu große Bilder)."); }
}
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

/* ---------- date helpers ---------- */
function parseBday(b){
  // b: "YYYY-MM-DD" or "--MM-DD" (year unknown) -> {y,m,d,hasYear}
  if(!b) return null;
  if(b.startsWith("--")){ const [,m,d]=b.split("-").filter(Boolean); return {y:null,m:+m,d:+d,hasYear:false}; }
  const [y,m,d]=b.split("-").map(Number);
  if(!y||!m||!d) return null;
  return {y,m,d,hasYear:true};
}
function nextBirthday(parsed, today){
  if(!parsed) return null;
  const mkSafe = (yr) => { const dt=new Date(yr,parsed.m-1,parsed.d); 
    if(dt.getMonth()!==parsed.m-1){ return new Date(yr,parsed.m-1,28); } return dt; };
  const t = new Date(today.getFullYear(),today.getMonth(),today.getDate());
  let nxt = mkSafe(t.getFullYear());
  if(nxt < t) nxt = mkSafe(t.getFullYear()+1);
  const days = Math.round((nxt - t)/86400000);
  let turning = null;
  if(parsed.hasYear) turning = nxt.getFullYear() - parsed.y;
  return {days, date:nxt, turning};
}
function currentAge(parsed, today){
  if(!parsed || !parsed.hasYear) return null;
  let a = today.getFullYear()-parsed.y;
  const beforeBday = (today.getMonth()+1 < parsed.m) ||
    (today.getMonth()+1===parsed.m && today.getDate()<parsed.d);
  if(beforeBday) a--;
  return a;
}
const MON = ["Jan.","Feb.","März","Apr.","Mai","Juni","Juli","Aug.","Sep.","Okt.","Nov.","Dez."];
function fmtBday(parsed){
  if(!parsed) return "";
  const base = `${parsed.d}. ${MON[parsed.m-1]}`;
  return parsed.hasYear ? `${base} ${parsed.y}` : base;
}
function daysLabel(d){
  if(d===0) return "heute";
  if(d===1) return "morgen";
  return `in ${d} Tg.`;
}

/* ---------- image compression ---------- */
function compressImage(file, cb){
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const max=480; let {width:w,height:h}=img;
      if(w>h && w>max){ h=h*max/w; w=max; } else if(h>max){ w=w*max/h; h=max; }
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      cb(c.toDataURL("image/jpeg",0.8));
    };
    img.onerror=()=>cb(null);
    img.src=e.target.result;
  };
  reader.onerror=()=>cb(null);
  reader.readAsDataURL(file);
}
const initials = (n) => (n||"?").trim().split(/\s+/).map(p=>p[0]).slice(0,2).join("").toUpperCase();

/* ---------- small components ---------- */
function Avatar({person,cls}){
  if(person && person.photo) return <img className={"avatar "+(cls||"")} src={person.photo} alt=""/>;
  return <div className={"avatar "+(cls||"")}>{person?initials(person.name):"?"}</div>;
}
function AvaSm({person}){
  if(person && person.photo) return <img className="ava-sm" src={person.photo} alt=""/>;
  return <div className="ava-sm">{person?initials(person.name):"?"}</div>;
}

/* ---------- list / Kartei ---------- */
function Kartei({people,groups,today,groupFilter,setGroupFilter,onOpen,onAdd,onSettings,onGraph}){
  const [q,setQ]=useState("");
  const groupName = groupFilter ? (groups.find(g=>g.id===groupFilter)||{}).name : null;
  const sorted = useMemo(()=>[...people].sort((a,b)=>a.name.localeCompare(b.name,"de")),[people]);
  const filtered = useMemo(()=>{
    let base = groupFilter ? sorted.filter(p=>(p.groups||[]).includes(groupFilter)) : sorted;
    const t=q.trim().toLowerCase();
    if(!t) return base;
    return base.filter(p=>{
      const custom=(p.custom||[]).map(c=>(c.label||"")+" "+(c.value||"")).join(" ");
      const conns=(p.connections||[]).map(c=>{ const o=people.find(x=>x.id===c.personId); return c.type+" "+(o?o.name:""); }).join(" ");
      const hay=[p.name,p.job,p.gifts,p.notes,p.metWhere,p.color,custom,conns].join(" ").toLowerCase();
      return hay.includes(t);
    });
  },[sorted,q,people,groupFilter]);

  const upcoming = useMemo(()=>{
    return people.map(p=>({p,nb:nextBirthday(parseBday(p.birthday),today)}))
      .filter(x=>x.nb && x.nb.days<=30)
      .sort((a,b)=>a.nb.days-b.nb.days);
  },[people,today]);

  const me = people.find(p=>p.isMe);
  const pinMe = me && !q && !groupFilter;
  const listed = pinMe ? filtered.filter(p=>p.id!==me.id) : filtered;

  const renderCard = (p, extraKey) => {
    const pb=parseBday(p.birthday); const age=currentAge(pb,today);
    const metaParts=[];
    if(p.job&&p.job.trim()) metaParts.push(p.job);
    if(pb) metaParts.push(fmtBday(pb)+(age!=null?` · ${age}`:""));
    if((p.connections||[]).length) metaParts.push(`${p.connections.length} Verb.`);
    return (
      <div className="card" key={(extraKey||"")+p.id} onClick={()=>onOpen(p.id)}>
        <Avatar person={p}/>
        <div>

      </div>
      <div className="fab"><div className="fab-inner">
        <button className="btn btn-ghost sm" onClick={onSettings} aria-label="Einstellungen">⚙︎</button>
        <button className="btn btn-ghost sm" onClick={onGraph} aria-label="Netz">✦</button>
        <button className="btn btn-primary" onClick={onAdd}>+ Person anlegen</button>
      </div></div>
    </div>
  );
}

/* ---------- long press + cropper ---------- */
function useLongPress(cb, ms){
  const timer=useRef(null);
  const fired=useRef(false);
  const clear=()=>{ if(timer.current){ clearTimeout(timer.current); timer.current=null; } };
  const start=()=>{ fired.current=false; clear(); timer.current=setTimeout(()=>{ fired.current=true; cb(); }, ms||550); };
  const handlers={
    onTouchStart:start, onTouchEnd:clear, onTouchMove:clear, onTouchCancel:clear,
    onMouseDown:start, onMouseUp:clear, onMouseLeave:clear,
    onContextMenu:(e)=>e.preventDefault(),
  };
  return {handlers, fired};
}

function ImageCropper({src,onCancel,onDone}){
  const boxRef=useRef();
  const [img,setImg]=useState(null);
  const [D,setD]=useState(0);
  const [z,setZ]=useState(1);
  const stateRef=useRef({s0:1,s:1,tx:0,ty:0});
  const [,force]=useState(0);
  const drag=useRef(null);

  useEffect(()=>{ const im=new Image(); im.onload=()=>setImg({w:im.naturalWidth,h:im.naturalHeight}); im.src=src; },[src]);
  useEffect(()=>{ if(boxRef.current) setD(boxRef.current.clientWidth||320); },[img]);

  const clampAll=()=>{ const st=stateRef.current; const iw=img.w*st.s, ih=img.h*st.s;
    st.tx=Math.min(0,Math.max(D-iw, st.tx)); st.ty=Math.min(0,Math.max(D-ih, st.ty)); };

  useEffect(()=>{
    if(!D||!img) return;
    const st=stateRef.current; const s0=D/Math.min(img.w,img.h);
    st.s0=s0; st.s=s0*z; st.tx=(D-img.w*st.s)/2; st.ty=(D-img.h*st.s)/2;
    clampAll(); force(n=>n+1);
  },[D,img]);

  const applyZoom=(nz)=>{
    if(!img||!D) return; const st=stateRef.current; const sNew=st.s0*nz; const c=D/2;
    st.tx=c-(c-st.tx)*(sNew/st.s); st.ty=c-(c-st.ty)*(sNew/st.s); st.s=sNew;
    clampAll(); setZ(nz); force(n=>n+1);
  };
  const pt=(e)=> e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};
  const dStart=(e)=>{ drag.current=pt(e); };
  const dMove=(e)=>{ if(!drag.current||!img) return; const p=pt(e); const st=stateRef.current;
    st.tx+=p.x-drag.current.x; st.ty+=p.y-drag.current.y; drag.current=p; clampAll(); force(n=>n+1); };
  const dEnd=()=>{ drag.current=null; };

  const confirm=()=>{
    const st=stateRef.current; const OUT=480; const side=D/st.s; const sx=-st.tx/st.s, sy=-st.ty/st.s;
    const c=document.createElement("canvas"); c.width=OUT; c.height=OUT; const ctx=c.getContext("2d");
    const im=new Image(); im.onload=()=>{ ctx.drawImage(im, sx,sy, side,side, 0,0, OUT,OUT); onDone(c.toDataURL("image/jpeg",0.85)); };
    im.src=src;
  };

  const st=stateRef.current;
  return (
    <div className="crop-overlay">
      <div className="crop-head">Bild zuschneiden</div>
      <div className="crop-stage">
        <div className="crop-box" ref={boxRef}
          onMouseDown={dStart} onMouseMove={dMove} onMouseUp={dEnd} onMouseLeave={dEnd}
          onTouchStart={dStart} onTouchMove={dMove} onTouchEnd={dEnd}>
          {img && <img src={src} draggable="false" style={{position:"absolute",
            width:img.w*st.s, height:img.h*st.s, left:st.tx, top:st.ty}}/>}
          <div className="crop-ring"></div>
        </div>
      </div>
      <div className="crop-controls">
        <input type="range" min="1" max="4" step="0.01" value={z} onChange={e=>applyZoom(parseFloat(e.target.value))}/>
        <div className="crop-hint">Verschieben mit dem Finger, Größe mit dem Regler</div>
      </div>
      <div className="crop-bar">
        <button className="btn btn-ghost" style={{flex:1}} onClick={onCancel}>Abbrechen</button>
        <button className="btn btn-primary" style={{flex:1}} onClick={confirm}>Übernehmen</button>
      </div>
    </div>
  );
}

function Detail({person,people,groups,onBack,onEdit,onOpen,onOpenGroup,onDelete,today}){

  if(!person) return null;
  const pb=parseBday(person.birthday); const nb=nextBirthday(pb,today); const age=currentAge(pb,today);
  const byId = id => people.find(p=>p.id===id);
  const fields=[
    {lab:"Geburtstag", val: pb ? (fmtBday(pb)
        + (age!=null?` (wird ${nb.turning}, ${nb.days===0?"heute!":daysLabel(nb.days)})`
                    :` (${nb.days===0?"heute!":daysLabel(nb.days)})`)) : ""},
    {lab:"Wie kennengelernt", val:person.metWhere},

    {lab:"Geschenk-Ideen / Vorlieben", val:person.gifts},
    {lab:"Notizen", val:person.notes},

  const guessSwatch = (txt)=>{
    const map={rot:"#c0392b",blau:"#2c6fbf",grün:"#3f8a5a",gruen:"#3f8a5a",gelb:"#e2b13c",
      orange:"#e07b2c",lila:"#8a5a9e",violett:"#8a5a9e",rosa:"#d98aa6","pink":"#d4548a",
      schwarz:"#222",weiß:"#eee",weiss:"#eee",grau:"#9a9a9a",braun:"#8a6a4a",türkis:"#3aa9a0",tuerkis:"#3aa9a0"};
    const k=Object.keys(map).find(c=>txt.toLowerCase().includes(c));

  return (

          <div>
            <h2>{person.name}{person.isMe && <span className="me-pill">Ich</span>}</h2>
            {person.job && person.job.trim() && <div className="dh-sub">{person.job}</div>}
          </div>
        </div>

        {fields.map((f,i)=>(
          <div className="field" key={i}>

              {f.val}

            <div className="lab">{c.label}<span className="secret-pill">geheim</span></div>
            <div className="val">{c.value}</div>
          </div>
        ))}
        {reveal && !(person.secret||[]).some(c=>c.label&&c.value) && (
          <div className="hint" style={{margin:"10px 2px"}}>Keine geheimen Felder. Beim Bearbeiten per langem Druck aufs Foto anlegen.</div>
        )}

            <div className="lab">Verbindungen</div>

              {person.connections.map((c,i)=>{

                if(!other) return null;
                return (
                  <div className="chip" key={i} onClick={()=>onOpen(other.id)}>
                    <AvaSm person={other}/>

                    <span className={"reltag t-"+c.type}>{c.type}</span>

              {(person.groups||[]).map(gid=>{ const g=groups.find(x=>x.id===gid); if(!g) return null;
                return <button className="chip chip-group" key={gid} onClick={()=>onOpenGroup(gid)}>{g.name}</button>; })}
            </div>

function EditPerson({person,people,groups,onCancel,onCreateGroup,onSave,today}){
  const isNew = !person;
  const [name,setName]=useState(person?.name||"");
  const [job,setJob]=useState(person?.job||"");
  const [photo,setPhoto]=useState(person?.photo||null);
  const pb=parseBday(person?.birthday);
  const [bdayDate,setBdayDate]=useState(pb&&pb.hasYear?person.birthday:(pb?`2000-${String(pb.m).padStart(2,"0")}-${String(pb.d).padStart(2,"0")}`:""));
  const [noYear,setNoYear]=useState(pb?!pb.hasYear:false);
  const [metWhere,setMetWhere]=useState(person?.metWhere||"");
  const [color,setColor]=useState(person?.color||"");
  const [gifts,setGifts]=useState(person?.gifts||"");
  const [notes,setNotes]=useState(person?.notes||"");
  const [custom,setCustom]=useState(person?.custom?JSON.parse(JSON.stringify(person.custom)):[]);
  const [conns,setConns]=useState(person?.connections?JSON.parse(JSON.stringify(person.connections)):[]);
  const [secret,setSecret]=useState(person?.secret?JSON.parse(JSON.stringify(person.secret)):[]);
  const [showSecret,setShowSecret]=useState(false);
  const [cropSrc,setCropSrc]=useState(null);
  const [pGroups,setPGroups]=useState(person?.groups?[...person.groups]:[]);
  const [newGroup,setNewGroup]=useState("");
  const lpSecret=useLongPress(()=>setShowSecret(s=>!s));
  const galleryRef=useRef();
  const camRef=useRef();

  const onFile=(e)=>{ const f=e.target.files[0]; if(f){ const r=new FileReader(); r.onload=ev=>setCropSrc(ev.target.result); r.readAsDataURL(f); } e.target.value=""; };

  const others = people.filter(p=>!person || p.id!==person.id)
    .filter(p=>!conns.some(c=>c.personId===p.id))
    .sort((a,b)=>a.name.localeCompare(b.name,"de"));
  const [connQuery,setConnQuery]=useState("");
  const [addType,setAddType]=useState("Freund");
  const addConnNow=(pid)=>{ setConns([...conns,{personId:pid,type:addType}]); setConnQuery(""); };
  const groupNameById=(id)=>(groups.find(g=>g.id===id)||{}).name||"";
  const otherMatches=others.filter(p=>{
    const t=connQuery.trim().toLowerCase(); if(!t) return true;
    const g=(p.groups||[]).map(groupNameById).join(" ");
    return (p.name+" "+g).toLowerCase().includes(t);
  });

  const setCustomField=(i,k,v)=>{ const n=[...custom]; n[i]={...n[i],[k]:v}; setCustom(n); };
  const setSecretField=(i,k,v)=>{ const n=[...secret]; n[i]={...n[i],[k]:v}; setSecret(n); };

  const handleSave=()=>{
    if(!name.trim()){ alert("Bitte einen Namen eingeben."); return; }
    let birthday=null;
    if(bdayDate){
      if(noYear){ const [,m,d]=bdayDate.split("-"); birthday=`--${m}-${d}`; }
      else birthday=bdayDate;
    }
    const cleanCustom=custom.filter(c=>(c.label&&c.label.trim())||(c.value&&c.value.trim()));
    const cleanSecret=secret.filter(c=>(c.label&&c.label.trim())||(c.value&&c.value.trim()));
    onSave({
      id:person?.id||uid(),
      name:name.trim(), job:job.trim(), photo, birthday, metWhere:metWhere.trim(),
      color:color.trim(), gifts:gifts.trim(), notes:notes.trim(),
      custom:cleanCustom, secret:cleanSecret, connections:conns, groups:pGroups, isMe:person?.isMe||false,
      created:person?.created||Date.now(), updated:Date.now(),
    });
  };

  const byId = id => people.find(p=>p.id===id);

  return (
    <div className="wrap">
      {cropSrc && <ImageCropper src={cropSrc} onCancel={()=>setCropSrc(null)} onDone={d=>{ setPhoto(d); setCropSrc(null); }}/>}
      <div className="navbar">
        <button className="back" onClick={onCancel}>‹ Abbrechen</button>
      </div>
      <h2 style={{fontFamily:"var(--serif)",fontWeight:600,fontSize:24,margin:"6px 2px 2px"}}>
        {isNew?"Neue Person":"Bearbeiten"}</h2>

      <div className="form-group">
        <label>Foto (optional)</label>
        <div className="photo-pick">
          <div className="avatar" {...lpSecret.handlers} onClick={()=>{ if(lpSecret.fired.current){ lpSecret.fired.current=false; return; } camRef.current.click(); }}>
            {photo? <img src={photo} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"50%"}}/> : (name?initials(name):"+")}
          </div>
          <div style={{flex:1}}>
            <div className="row" style={{gap:8}}>
              <button type="button" className="btn btn-soft sm" onClick={()=>camRef.current.click()}>Foto aufnehmen</button>
              <button type="button" className="btn btn-ghost sm" onClick={()=>galleryRef.current.click()}>Galerie</button>
            </div>
            {photo && (
              <div className="row" style={{gap:8,marginTop:8}}>
                <button type="button" className="btn btn-soft sm" onClick={()=>setCropSrc(photo)}>Zuschneiden</button>
                <button type="button" className="btn btn-ghost sm" onClick={()=>setPhoto(null)}>Entfernen</button>
              </div>
            )}
            <div className="hint">Wird zugeschnitten und lokal gespeichert.</div>
          </div>
          <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={onFile}/>
          <input ref={galleryRef} type="file" accept="image/*" style={{display:"none"}} onChange={onFile}/>
        </div>
      </div>

      <div className="form-group">
        <label>Name</label>
        <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Vor- und Nachname"/>
      </div>

      <div className="form-group">
        <label>Funktion</label>
        <input type="text" value={job} onChange={e=>setJob(e.target.value)} placeholder="z.B. mein Vater, beste Freundin, Chefin"/>
      </div>

      <div className="form-group">
        <label>Geburtstag</label>
        <input type="date" value={bdayDate} onChange={e=>setBdayDate(e.target.value)}/>
        <label style={{display:"flex",alignItems:"center",gap:8,marginTop:8,fontWeight:400,fontSize:14,color:"var(--muted)"}}>
          <input type="checkbox" style={{width:"auto"}} checked={noYear} onChange={e=>setNoYear(e.target.checked)}/>
          Jahr unbekannt (nur Tag und Monat merken)
        </label>
      </div>

      <div className="form-group">
        <label>Wie kennengelernt</label>
        <input type="text" value={metWhere} onChange={e=>setMetWhere(e.target.value)} placeholder="z.B. Uni, über Lisa, Nachbarschaft"/>
      </div>

      <div className="form-group">
        <label>Lieblingsfarbe / Blumen</label>
        <input type="text" value={color} onChange={e=>setColor(e.target.value)} placeholder="z.B. Grün, Pfingstrosen"/>
      </div>

      <div className="form-group">
        <label>Geschenk-Ideen / Vorlieben</label>
        <textarea value={gifts} onChange={e=>setGifts(e.target.value)} placeholder="Was kommt gut an, was gar nicht…"/>
      </div>

      <div className="form-group">
        <label>Notizen</label>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Alles weitere, das du dir merken willst"/>
      </div>

        <label>Eigene Felder</label>
        {custom.map((c,i)=>(
          <div className="custom-row" key={i}>
            <input type="text" value={c.label} placeholder="Feld" onChange={e=>setCustomField(i,"label",e.target.value)}/>

          </div>
        ))}
        <button type="button" className="btn btn-ghost sm btn-block" style={{marginTop:8}}
          onClick={()=>setCustom([...custom,{label:"",value:""}])}>+ Feld hinzufügen</button>
      </div>

      {showSecret && (
      <div className="form-group">
        <label>Geheime Felder<span className="secret-pill">geheim</span></label>
        {secret.map((c,i)=>(
          <div className="custom-row" key={i}>
            <input type="text" value={c.label} placeholder="Feld" onChange={e=>setSecretField(i,"label",e.target.value)}/>
            <input type="text" value={c.value} placeholder="Inhalt" onChange={e=>setSecretField(i,"value",e.target.value)}/>
            <button type="button" className="btn btn-soft sm" onClick={()=>setSecret(secret.filter((_,j)=>j!==i))}>✕</button>
          </div>
        ))}
        <button type="button" className="btn btn-ghost sm btn-block" style={{marginTop:8}}
          onClick={()=>setSecret([...secret,{label:"",value:""}])}>+ Geheimes Feld</button>
        <div className="hint">Erscheint nur nach langem Druck aufs Foto. Lokal gespeichert, nicht verschlüsselt.</div>

        {others.length>0 ? (

            <div className="seg">
              {REL_TYPES.map(t=>(
                <button type="button" key={t} className={(addType===t?"on t-"+t:"")} onClick={()=>setAddType(t)}>{t}</button>

            {groups.map(g=>(
              <button type="button" key={g.id} className={pGroups.includes(g.id)?"on":""}
                onClick={()=>setPGroups(pGroups.includes(g.id)?pGroups.filter(x=>x!==g.id):[...pGroups,g.id])}>{g.name}</button>
            ))}
          </div>
        )}
        <div className="custom-row">
          <input type="text" value={newGroup} placeholder="Neue Gruppe (z.B. Familie Schulz)"
            onChange={e=>setNewGroup(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter"&&newGroup.trim()){ const id=onCreateGroup(newGroup.trim()); setPGroups(g=>[...g,id]); setNewGroup(""); } }}/>
          <button type="button" className="btn btn-soft sm" disabled={!newGroup.trim()}
            onClick={()=>{ const id=onCreateGroup(newGroup.trim()); setPGroups(g=>[...g,id]); setNewGroup(""); }}>+</button>
        </div>
        <div className="hint">Mitglieder einer Gruppe erscheinen zusammen, ohne sie einzeln zu verbinden.</div>
      </div>

      <div className="danger-zone">
        <button className="btn btn-ghost" style={{flex:"0 0 40%"}} onClick={onCancel}>Abbrechen</button>
        <button className="btn btn-primary" style={{flex:1}} onClick={handleSave}>Speichern</button>
      </div>
    </div>
  );
}

/* ---------- settings ---------- */
function Settings({people,ideas,groups,onBack,onImport,onAddIdea,onRemoveIdea,onToggleIdea,onRenameGroup,onDeleteGroup,onSetMe,toast}){
  const fileRef=useRef();
  const [ideaText,setIdeaText]=useState("");
  const [histOpen,setHistOpen]=useState(false);
  const doExport=()=>{
    const blob=new Blob([JSON.stringify({app:"Torcon",version:VERSION,exported:new Date().toISOString(),people,ideas,groups},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const d=new Date().toISOString().slice(0,10);
    a.href=url; a.download=`torcon-export-${d}.json`; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast("Export gestartet");
  };
  const onFile=(e)=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        const imported=Array.isArray(data)?data:data.people;
        if(!Array.isArray(imported)) throw new Error();
        onImport(imported, Array.isArray(data.ideas)?data.ideas:[], Array.isArray(data.groups)?data.groups:[]);
      }catch(err){ alert("Datei konnte nicht gelesen werden. Erwartet wird ein Torcon-Export (JSON)."); }
    };
    r.readAsText(f);
    e.target.value="";
  };
  return (
    <div className="wrap">
      <div className="navbar"><button className="back" onClick={onBack}>‹ Kartei</button><button className="nav-brand" onClick={onBack}>Torcon</button></div>
      <h2 style={{fontFamily:"var(--serif)",fontWeight:600,fontSize:24,margin:"6px 2px 2px"}}>Einstellungen</h2>

      <div className="sect-label" style={{marginTop:20}}>Ich</div>
      <div className="field">
        <div className="lab">Wer bist du?</div>
        <select value={(people.find(p=>p.isMe)||{}).id||""} onChange={e=>onSetMe(e.target.value||null)} style={{marginTop:6}}>
          <option value="">— niemand —</option>
          {[...people].sort((a,b)=>a.name.localeCompare(b.name,"de")).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        <div className="hint">Dein Mittelpunkt in der Netz-Ansicht. Nur einmal nötig.</div>
      </div>

      <div className="sect-label" style={{marginTop:24}}>Daten</div>
      <div className="field">
        <div className="lab">Sicherung</div>
        <div className="val" style={{fontSize:14,color:"var(--muted)"}}>
          {people.length} {people.length===1?"Person":"Personen"} gespeichert. Alles liegt nur lokal auf diesem Gerät.
        </div>
        <div className="settings-list">
          <button className="btn btn-soft btn-block" onClick={doExport}>Als JSON exportieren</button>
          <button className="btn btn-ghost btn-block" onClick={()=>fileRef.current.click()}>Aus JSON importieren</button>
          <input ref={fileRef} type="file" accept="application/json,.json" style={{display:"none"}} onChange={onFile}/>
          <div className="hint">Import fügt importierte Personen hinzu bzw. aktualisiert vorhandene (gleiche ID).</div>
        </div>
      </div>

      <div className="sect-label" style={{marginTop:24}}>Ideen</div>
      <div className="field">
        <div className="lab">Notizzettel für die App</div>
        <div className="custom-row" style={{marginTop:8}}>
          <input style={{flex:1}} type="text" value={ideaText} placeholder="Neue Idee…"
            onChange={e=>setIdeaText(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter"&&ideaText.trim()){ onAddIdea(ideaText.trim()); setIdeaText(""); } }}/>
          <button className="btn btn-soft sm" disabled={!ideaText.trim()}
            onClick={()=>{ onAddIdea(ideaText.trim()); setIdeaText(""); }}>+</button>
        </div>
        {ideas.length===0 && <div className="hint" style={{marginTop:8}}>Noch keine Ideen notiert.</div>}
        {ideas.map(it=>(
          <div className="idea-row" key={it.id}>
            <button className={"idea-check"+(it.done?" on":"")} onClick={()=>onToggleIdea(it.id)} aria-label="erledigt">{it.done?"✓":""}</button>
            <span className={"idea-text"+(it.done?" done":"")}>{it.text}</span>
            <button className="inline-rm" onClick={()=>onRemoveIdea(it.id)}>✕</button>
          </div>
        ))}
      </div>

      <div className="sect-label" style={{marginTop:24}}>Gruppen</div>
      {groups.length===0 && <div className="hint" style={{margin:"2px 2px 0"}}>Noch keine Gruppen. Leg sie beim Bearbeiten einer Person an.</div>}
      {groups.map(g=>{
        const count=people.filter(p=>(p.groups||[]).includes(g.id)).length;
        return (
          <div className="field" key={g.id}>
            <div className="custom-row" style={{alignItems:"center"}}>
              <input style={{flex:1}} type="text" value={g.name} onChange={e=>onRenameGroup(g.id,e.target.value)}/>
              <span className="hint" style={{flex:"0 0 auto",margin:0}}>{count}</span>
              <button className="btn btn-soft sm" onClick={()=>{ if(confirm(`Gruppe „${g.name}" löschen? Personen bleiben erhalten.`)) onDeleteGroup(g.id); }}>✕</button>
            </div>
          </div>
        );
      })}

      <div className="sect-label" style={{marginTop:24}}>Versionshistorie</div>
      <button className="hist-toggle" onClick={()=>setHistOpen(o=>!o)}>
        <span>Version {VERSION} · aktuell</span>
        <span className="chev">{histOpen?"▾ einklappen":"▸ alle anzeigen"}</span>
      </button>
      {histOpen && CHANGELOG.map(c=>(
        <div className="field" key={c.v}>
          <div className="lab">Version {c.v}{c.v===VERSION?" · aktuell":""}</div>
          <div className="val" style={{fontSize:14.5}}>{c.d}</div>
        </div>
      ))}

      <div className="sect-label" style={{marginTop:24}}>Info</div>
      <div className="field">
        <div className="lab">Torcon</div>
        <div className="val" style={{fontSize:14}}>Version {VERSION} · Torben Connections</div>
      </div>
    </div>
  );
}

/* ---------- app ---------- */
/* ---------- netz / star graph ---------- */
const REL_COLOR={Familie:"#3f6b5a",Freund:"#9e3b3b",Partner:"#8a5a7a",Kollege:"#4a6280",Sonstige:"#7a756d"};
function StarGraph({people,onBack,onOpen}){
  const me=people.find(p=>p.isMe);
  const [centerId,setCenterId]=useState(me?me.id:null);
  const byId=id=>people.find(p=>p.id===id);
  const center=byId(centerId)||me||null;

  const Face=({p,x,y,r,ring,bold,onTap})=>{
    const cid="cl_"+p.id;
    const nm=p.name.length>14?p.name.slice(0,13)+"…":p.name;
    return (
      <g onClick={onTap} style={{cursor:"pointer"}}>
        <clipPath id={cid}><circle cx={x} cy={y} r={r}/></clipPath>
        {p.photo
          ? <image href={p.photo} xlinkHref={p.photo} x={x-r} y={y-r} width={r*2} height={r*2} clipPath={"url(#"+cid+")"} preserveAspectRatio="xMidYMid slice"/>
          : <g><circle cx={x} cy={y} r={r} fill="#efeae3"/><text x={x} y={y} textAnchor="middle" dominantBaseline="central" fontFamily="Georgia, serif" fontSize={r*0.8} fill="#8a847c">{initials(p.name)}</text></g>}
        <circle cx={x} cy={y} r={r} fill="none" stroke={ring||"#c9c2b8"} strokeWidth={bold?10:7}/>
        <text x={x} y={y+r+32} textAnchor="middle" fontSize="29" fontFamily="sans-serif" fill="#23201d">{nm}</text>
      </g>
    );
  };

  let inner=null;
  if(!me){
    inner=<div className="empty"><div className="e-title">Kein Mittelpunkt gesetzt</div>
      Wähle in den Einstellungen unter „Ich", wer du bist, dann erscheint hier dein Netz.</div>;
  } else if(center){
    const directConns=(center.connections||[]).map(c=>({person:byId(c.personId),type:c.type,group:false})).filter(x=>x.person);
    const directIds=new Set(directConns.map(d=>d.person.id));
    const coGroup=people.filter(p=>p.id!==center.id && !directIds.has(p.id) && (p.groups||[]).some(g=>(center.groups||[]).includes(g))).map(p=>({person:p,type:null,group:true}));
    const all=[...directConns,...coGroup];
    const VB=1000, cx=500, cy=500, R=360;
    const pos=all.map((d,i)=>{ const a=(-90+i*360/all.length)*Math.PI/180;
      return {person:d.person,type:d.type,group:d.group,x:cx+R*Math.cos(a),y:cy+R*Math.sin(a)}; });
    const posById={}; pos.forEach(p=>posById[p.person.id]=p);
    const links=[];
    pos.forEach(p=>{ (p.person.connections||[]).forEach(c=>{ const q=posById[c.personId];
      if(q && c.personId>p.person.id) links.push({a:p,b:q}); }); });
    const centerRing = center.id===me.id ? "#9e3b3b" : "#23201d";
    inner=(
      <div className="graph-stage">
        <svg viewBox={"0 0 "+VB+" "+VB} className="graph-svg">
          {pos.map((p,i)=> p.group
            ? <line key={"c"+i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#b0a99e" strokeWidth="3" strokeDasharray="3 8" opacity="0.7"/>
            : <line key={"c"+i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke={REL_COLOR[p.type]||"#c9c2b8"} strokeWidth="4" opacity="0.55"/>)}
          {links.map((l,i)=><line key={"l"+i} x1={l.a.x} y1={l.a.y} x2={l.b.x} y2={l.b.y} stroke="#d3ccc1" strokeWidth="3" strokeDasharray="2 6"/>)}
          {pos.map(p=><Face key={p.person.id} p={p.person} x={p.x} y={p.y} r={78} ring={p.group?"#b0a99e":REL_COLOR[p.type]} onTap={()=>setCenterId(p.person.id)}/>)}
          <Face p={center} x={cx} y={cy} r={96} ring={centerRing} bold={true} onTap={()=>onOpen(center.id)}/>
        </svg>
        {all.length===0 && <div className="hint" style={{textAlign:"center",padding:"0 24px 24px"}}>{center.name} hat noch keine Verbindungen oder Gruppen.</div>}
      </div>
    );
  }
  return (
    <div className="graph-view">
      <div className="navbar" style={{padding:"14px 16px"}}>
        <button className="back" onClick={onBack}>‹ Kartei</button>
        {me && center && center.id!==me.id && <button className="nav-brand" onClick={()=>setCenterId(me.id)}>zu mir</button>}
      </div>
      {me && center && <div className="graph-title">Netz um {center.name}<span className="graph-hint">Gesicht antippen springt dorthin, Mitte öffnet das Profil</span></div>}
      {inner}
    </div>
  );
}

function App(){
  const _init = useMemo(()=>loadStore(),[]);
  const [people,setPeople]=useState(_init.people);
  const [ideas,setIdeas]=useState(_init.ideas);
  const [groups,setGroups]=useState(_init.groups);
  const [view,setView]=useState({name:"list"}); // list | detail(id) | edit(id|null) | settings
  const [groupFilter,setGroupFilter]=useState(null);
  const [toastMsg,setToastMsg]=useState(null);
  const [updateVer,setUpdateVer]=useState(null);
  const today=useMemo(()=>new Date(),[]);
  useEffect(()=>{ saveStore(people, ideas, groups); },[people, ideas, groups]);
  const toast=(m)=>{ setToastMsg(m); setTimeout(()=>setToastMsg(null),1900); };

  useEffect(()=>{
    let stopped=false;
    const newer=(a,b)=>{ const pa=a.split(".").map(Number),pb=b.split(".").map(Number);
      for(let i=0;i<Math.max(pa.length,pb.length);i++){ const x=pa[i]||0,y=pb[i]||0; if(x!==y) return x>y; } return false; };
    const check=async()=>{
      try{
        const base=location.href.split("#")[0].split("?")[0];
        const r=await fetch(base+"?_="+Date.now(),{cache:"no-store"});
        if(!r.ok) return;
        const t=await r.text();
        const m=t.match(/const VERSION\s*=\s*"([\d.]+)"/);
        if(m && !stopped && newer(m[1],VERSION)) setUpdateVer(m[1]);
      }catch(e){}
    };
    check();
    const onVis=()=>{ if(document.visibilityState==="visible") check(); };
    document.addEventListener("visibilitychange",onVis);
    return ()=>{ stopped=true; document.removeEventListener("visibilitychange",onVis); };
  },[]);

  const addIdea=(text)=>setIdeas(prev=>[{id:uid(),text,done:false,created:Date.now()},...prev]);
  const removeIdea=(id)=>setIdeas(prev=>prev.filter(i=>i.id!==id));
  const toggleIdea=(id)=>setIdeas(prev=>prev.map(i=>i.id===id?{...i,done:!i.done}:i));

  const createGroup=(name)=>{ const g={id:uid(),name:name.trim()}; setGroups(prev=>[...prev,g]); return g.id; };
  const renameGroup=(id,name)=>setGroups(prev=>prev.map(g=>g.id===id?{...g,name}:g));
  const deleteGroup=(id)=>{ setGroups(prev=>prev.filter(g=>g.id!==id));
    setPeople(prev=>prev.map(p=>({...p,groups:(p.groups||[]).filter(x=>x!==id)}))); };
  const setMe=(id)=>setPeople(prev=>prev.map(p=>({...p,isMe:p.id===id})));

  const byId = id => people.find(p=>p.id===id);

  // reciprocal connections
  const syncConnections = (list, savedId, conns) => {
    return list.map(p=>{
      if(p.id===savedId) return p;
      const shouldHave = conns.find(c=>c.personId===p.id);
      let pc=(p.connections||[]).filter(c=>c.personId!==savedId);
      if(shouldHave) pc=[...pc,{personId:savedId,type:shouldHave.type}];
      return {...p,connections:pc};
    });
  };

  const savePerson=(person)=>{
    setPeople(prev=>{
      const exists=prev.some(p=>p.id===person.id);
      let next=exists?prev.map(p=>p.id===person.id?person:p):[...prev,person];
      next=syncConnections(next, person.id, person.connections||[]);
      if(person.isMe) next=next.map(p=>p.id===person.id?p:(p.isMe?{...p,isMe:false}:p));
      return next;
    });
    setView({name:"detail",id:person.id});
    toast(byId(person.id)?"Gespeichert":"Person angelegt");
  };

  const deletePerson=(id)=>{
    setPeople(prev=>prev.filter(p=>p.id!==id)
      .map(p=>({...p,connections:(p.connections||[]).filter(c=>c.personId!==id)})));
    setView({name:"list"});
    toast("Gelöscht");
  };

  const importPeople=(imported, importedIdeas=[], importedGroups=[])=>{
    if(importedGroups.length){
      setGroups(prev=>{ const have=new Set(prev.map(g=>g.id));
        return [...prev, ...importedGroups.filter(g=>g&&g.id&&!have.has(g.id))]; });
    }
    setPeople(prev=>{
      const map=new Map(prev.map(p=>[p.id,p]));
      let added=0,updated=0;
      imported.forEach(p=>{
        if(!p||!p.id||!p.name) return;
        if(map.has(p.id)) updated++; else added++;
        map.set(p.id,p);
      });
      toast(`${added} neu, ${updated} aktualisiert`);
      return Array.from(map.values());
    });
    if(importedIdeas.length){
      setIdeas(prev=>{
        const have=new Set(prev.map(i=>i.id));
        const add=importedIdeas.filter(i=>i&&i.id&&!have.has(i.id));
        return [...add, ...prev];
      });
    }
  };

  let body;
  if(view.name==="list")
    body=<Kartei people={people} groups={groups} today={today}
      groupFilter={groupFilter} setGroupFilter={setGroupFilter}
      onOpen={id=>setView({name:"detail",id})}
      onAdd={()=>setView({name:"edit",id:null})}
      onSettings={()=>setView({name:"settings"})}
      onGraph={()=>setView({name:"graph"})}/>;
  else if(view.name==="detail")
    body=<Detail person={byId(view.id)} people={people} groups={groups} today={today}
      onBack={()=>setView({name:"list"})}
      onEdit={()=>setView({name:"edit",id:view.id})}
      onOpen={id=>setView({name:"detail",id})}
      onOpenGroup={(gid)=>{ setGroupFilter(gid); setView({name:"list"}); }}
      onDelete={deletePerson}/>;
  else if(view.name==="edit")
    body=<EditPerson person={view.id?byId(view.id):null} people={people} groups={groups} today={today}
      onCancel={()=>setView(view.id?{name:"detail",id:view.id}:{name:"list"})}
      onCreateGroup={createGroup}
      onSave={savePerson}/>;
  else if(view.name==="graph")
    body=<StarGraph people={people} onBack={()=>setView({name:"list"})} onOpen={id=>setView({name:"detail",id})}/>;
  else if(view.name==="settings")
    body=<Settings people={people} ideas={ideas} groups={groups} onBack={()=>setView({name:"list"})} onImport={importPeople} onAddIdea={addIdea} onRemoveIdea={removeIdea} onToggleIdea={toggleIdea} onRenameGroup={renameGroup} onDeleteGroup={deleteGroup} onSetMe={setMe} toast={toast}/>;

  return <>
    {updateVer && (
      <div className="update-bar">
        <span>Neue Version v{updateVer} verfügbar.</span>
        <button className="ub-load" onClick={()=>location.reload()}>Neu laden</button>
        <button className="ub-x" onClick={()=>setUpdateVer(null)} aria-label="ausblenden">✕</button>
      </div>
    )}
    {body}
    {toastMsg && <div className="toast">{toastMsg}</div>}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
